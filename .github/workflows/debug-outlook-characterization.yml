name: debug-outlook-characterization

on:
  pull_request:
    branches: [main]

jobs:
  debug:
    runs-on: ubuntu-latest
    env:
      CBQN_REF: master
    steps:
      - uses: actions/checkout@v4

      - name: Install CBQN
        run: |
          git clone --depth 1 --branch "$CBQN_REF" https://github.com/dzaima/CBQN.git
          make -C CBQN -j$(nproc)
          sudo cp CBQN/BQN /usr/local/bin/bqn

      - name: Capture focused test
        shell: bash
        run: |
          set +e
          bqn tests/test_src_next_outlook_actual_snapshot_characterization.bqn > outlook-characterization.txt 2>&1
          rc=$?
          echo "exit_code=$rc" >> outlook-characterization.txt
          exit 0

      - uses: actions/upload-artifact@v4
        with:
          name: outlook-characterization-debug
          path: outlook-characterization.txt
