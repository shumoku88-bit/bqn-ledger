name: M2 verification TODO one-shot patch

on:
  push:
    branches: [docs/verify-currency-m2-route-m25]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/verify-currency-m2-route-m25
          fetch-depth: 0
      - name: Patch TODO and self-remove
        run: |
          python3 .github/scripts/patch_m2_verification_todo.py
          rm .github/scripts/patch_m2_verification_todo.py
          rm .github/workflows/m2-verification-todo-patch.yml
      - name: Commit routing update
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add TODO.md .github/scripts/patch_m2_verification_todo.py .github/workflows/m2-verification-todo-patch.yml
          git commit -m 'docs: close M2 and route M2.5 checkpoint'
          git push origin HEAD:docs/verify-currency-m2-route-m25
