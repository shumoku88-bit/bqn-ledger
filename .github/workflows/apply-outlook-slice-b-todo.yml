name: apply-outlook-slice-b-todo

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply exact TODO replacements
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("TODO.md")
          text = path.read_text()
          replacements = [
              (
                  "Last hygiene pass: 2026-07-16 — loader/util ownership normalization and Outlook / `actual_snapshot` Slice A checked numeric-owner runtime migration are complete. No Outlook plan/anchor Slice B, next configurable-ledger slice, Israel follow-on, strict-source Step 2–5, M4, or other implementation candidate is selected.",
                  "Last hygiene pass: 2026-07-16 — loader/util ownership normalization and Outlook checked numeric-owner Slices A and B are complete. No Daily Trend alignment slice, next configurable-ledger slice, Israel follow-on, strict-source Step 2–5, M4, or other implementation candidate is selected.",
              ),
              (
                  "Status: selected report-engine direction. Actual Comparison and Outlook / `actual_snapshot` Slice A characterization, compatibility decisions, and numeric-owner runtime migrations are complete. Records include `docs/archive/completed-plans/ACTUAL_COMPARISON_NUMERIC_OWNER_RUNTIME_MIGRATION-2026-07-15.md` and `docs/archive/completed-plans/OUTLOOK_ACTUAL_SNAPSHOT_NUMERIC_OWNER_RUNTIME_MIGRATION-2026-07-16.md`.",
                  "Status: selected report-engine direction. Actual Comparison and Outlook Slices A and B characterization, compatibility decisions, and numeric-owner runtime migrations are complete. Records include `docs/archive/completed-plans/ACTUAL_COMPARISON_NUMERIC_OWNER_RUNTIME_MIGRATION-2026-07-15.md`, `docs/archive/completed-plans/OUTLOOK_ACTUAL_SNAPSHOT_NUMERIC_OWNER_RUNTIME_MIGRATION-2026-07-16.md`, and `docs/archive/completed-plans/OUTLOOK_REMAINING_PLAN_NUMERIC_OWNER_RUNTIME_MIGRATION-2026-07-16.md`.",
              ),
              (
                  "- Outlook Slice A now derives cumulative inclusive-O actual balances from checked Posting IR through a local TBDS view; applicable rejected actual evidence fails closed and Outlook suppresses derived money on snapshot error.\n- The next Report Projection Alignment candidate is **Slice B: Outlook remaining-plan monetary ownership and anchor policy**. It remains unselected. The approved policy reserves valid anchored outflows when unmet, admits valid anchored inflows only after matching actual income through O, and treats invalid anchor metadata as `error`.\n- Do not infer helper renaming, generic temporal kernel, report-wide `--as-of`, source TSV migration, Daily Capacity connection, policy expansion, or automatic write.",
                  "- Outlook Slice A derives cumulative inclusive-O actual balances from checked Posting IR through a local TBDS view; applicable rejected actual evidence fails closed.\n- Outlook Slice B derives remaining-plan money from admitted plan Posting IR, retains plan-ID completion evidence, reserves valid anchored outflows when unmet, admits valid anchored inflows only after matching actual income through O, and treats applicable invalid anchor evidence as `error`.\n- The next Report Projection Alignment candidate is **Daily Trend plan monetary ownership**. It remains unselected.\n- Do not infer helper renaming, generic temporal kernel, report-wide `--as-of`, source TSV migration, Daily Capacity connection, policy expansion, or automatic write.",
              ),
          ]

          changed = False
          for old, new in replacements:
              if old in text:
                  text = text.replace(old, new, 1)
                  changed = True
              elif new not in text:
                  raise SystemExit(f"expected TODO text not found: {old[:80]}")

          if changed:
              path.write_text(text)
          PY

          if git diff --quiet -- TODO.md; then
            echo "TODO already current"
            exit 0
          fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add TODO.md
          git commit -m "docs: route TODO after Outlook Slice B"
          git push origin HEAD:"$GITHUB_HEAD_REF"
