name: M2 one-shot dispatcher patch

on:
  push:
    branches: [feat/currency-m2-editor-input]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/currency-m2-editor-input
          fetch-depth: 0
      - name: Patch dispatcher and self-remove
        run: |
          python3 .github/scripts/patch_m2_edit_dispatcher.py
          rm .github/scripts/patch_m2_edit_dispatcher.py
          rm .github/workflows/m2-one-shot-patch.yml
      - name: Commit patched dispatcher
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tools/edit-bqn .github/scripts/patch_m2_edit_dispatcher.py .github/workflows/m2-one-shot-patch.yml
          git commit -m 'feat: route M2 currency options through editor dispatcher'
          git push origin HEAD:feat/currency-m2-editor-input
