name: budget-style-audit

on:
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect explicit budget-style inventory
        run: bash checks/audit-budget-style-explicit.sh 2> budget-style-audit.txt
      - name: Upload inventory
        uses: actions/upload-artifact@v4
        with:
          name: budget-style-audit
          path: budget-style-audit.txt
          if-no-files-found: error
