name: M2 one-shot fraction fix

on:
  push:
    branches: [feat/currency-m2-editor-input]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/currency-m2-editor-input
          fetch-depth: 0
      - name: Fix fraction count and self-remove
        run: |
          python3 .github/scripts/fix_m2_fraction_digits.py
          rm .github/scripts/fix_m2_fraction_digits.py
          rm .github/workflows/m2-one-shot-fraction-fix.yml
      - name: Commit corrected validation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src_edit/validate.bqn .github/scripts/fix_m2_fraction_digits.py .github/workflows/m2-one-shot-fraction-fix.yml
          git commit -m 'fix: count M2 fractional digits explicitly'
          git push origin HEAD:feat/currency-m2-editor-input
