name: finalize-actual-snapshot-routing

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Patch completion routing
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              s = p.read_text()
              if old not in s:
                  raise SystemExit(f"expected text missing in {path}: {old[:80]!r}")
              p.write_text(s.replace(old, new, 1))

          replace(
              "TODO.md",
              "Last hygiene pass: 2026-07-16 — loader/util ownership normalization and the Outlook / `actual_snapshot` characterization plus numeric-owner compatibility decision are complete. No Outlook runtime migration, next configurable-ledger slice, Israel follow-on, strict-source Step 2–5, M4, or other implementation candidate is selected.",
              "Last hygiene pass: 2026-07-16 — loader/util ownership normalization and Outlook / `actual_snapshot` Slice A checked numeric-owner runtime migration are complete. No Outlook plan/anchor Slice B, next configurable-ledger slice, Israel follow-on, strict-source Step 2–5, M4, or other implementation candidate is selected."
          )
          replace(
              "TODO.md",
              "Status: selected report-engine direction. Actual Comparison characterization, compatibility decision, and numeric-owner runtime migration are complete. Outlook / `actual_snapshot` characterization and numeric-owner compatibility decision are also complete. Records: `docs/archive/completed-plans/ACTUAL_COMPARISON_NUMERIC_OWNER_RUNTIME_MIGRATION-2026-07-15.md`, `docs/archive/completed-plans/OUTLOOK_ACTUAL_SNAPSHOT_CHARACTERIZATION-2026-07-16.md`, and `docs/archive/completed-plans/OUTLOOK_ACTUAL_SNAPSHOT_NUMERIC_OWNER_COMPATIBILITY_DECISION-2026-07-16.md`.",
              "Status: selected report-engine direction. Actual Comparison and Outlook / `actual_snapshot` Slice A characterization, compatibility decisions, and numeric-owner runtime migrations are complete. Records include `docs/archive/completed-plans/ACTUAL_COMPARISON_NUMERIC_OWNER_RUNTIME_MIGRATION-2026-07-15.md` and `docs/archive/completed-plans/OUTLOOK_ACTUAL_SNAPSHOT_NUMERIC_OWNER_RUNTIME_MIGRATION-2026-07-16.md`."
          )
          replace(
              "TODO.md",
              "- Outlook migration is approved as two independent runtime slices: Slice A for cumulative inclusive-O `actual_snapshot` checked ownership and fail-closed propagation, then Slice B for unfinished-plan checked amounts and asymmetric anchor policy.\n- Slice B policy is already decided but not selected: valid anchored outflows remain reserved when the anchor is unmet; valid anchored inflows require an admitted actual matching income event at or before O within C; invalid anchor metadata is `error`.\n- The next Report Projection Alignment candidate is **Slice A: `actual_snapshot` checked numeric-owner runtime migration**. It remains unselected. Do not infer plan-side migration, anchor runtime changes, helper renaming, generic temporal kernel, report-wide `--as-of`, source TSV migration, Daily Capacity connection, policy expansion, or automatic write.",
              "- Outlook Slice A now derives cumulative inclusive-O actual balances from checked Posting IR through a local TBDS view; applicable rejected actual evidence fails closed and Outlook suppresses derived money on snapshot error.\n- The next Report Projection Alignment candidate is **Slice B: Outlook remaining-plan monetary ownership and anchor policy**. It remains unselected. The approved policy reserves valid anchored outflows when unmet, admits valid anchored inflows only after matching actual income through O, and treats invalid anchor metadata as `error`.\n- Do not infer helper renaming, generic temporal kernel, report-wide `--as-of`, source TSV migration, Daily Capacity connection, policy expansion, or automatic write."
          )

          replace(
              "docs/archive/active-plans/REPORT_PROJECTION_ALIGNMENT_PLAN-2026-07-15.md",
              "- `../completed-plans/OUTLOOK_ACTUAL_SNAPSHOT_NUMERIC_OWNER_COMPATIBILITY_DECISION-2026-07-16.md`.",
              "- `../completed-plans/OUTLOOK_ACTUAL_SNAPSHOT_NUMERIC_OWNER_COMPATIBILITY_DECISION-2026-07-16.md`;\n- `../completed-plans/OUTLOOK_ACTUAL_SNAPSHOT_NUMERIC_OWNER_RUNTIME_MIGRATION-2026-07-16.md`."
          )
          replace(
              "docs/archive/active-plans/REPORT_PROJECTION_ALIGNMENT_PLAN-2026-07-15.md",
              "Slice A preserves cumulative inclusive-O actual balances, fails closed on applicable rejected actual evidence, and adds only the narrow Outlook error propagation needed to avoid deriving daily allowance from an invalid balance. Slice B later uses checked plan amounts plus existing unfinished/completed evidence and applies the approved asymmetric anchor policy: valid anchored outflows remain reserved when unmet, while valid anchored inflows require an actual matching income event at or before O within C. Invalid anchor metadata is error evidence. Neither runtime slice is selected automatically.",
              "Slice A is complete: cumulative inclusive-O actual balances now use checked Posting IR through a local TBDS view, applicable rejected actual evidence fails closed, and Outlook propagates snapshot failure without deriving daily allowance. Slice B remains unselected; it may later use checked plan amounts plus existing unfinished/completed evidence and the approved asymmetric anchor policy."
          )
          replace(
              "docs/archive/active-plans/REPORT_PROJECTION_ALIGNMENT_PLAN-2026-07-15.md",
              "They preserve current evidence while approving cumulative inclusive-O checked actual ownership, section-local fail-closed behavior, migration separation, helper compatibility, unfinished-plan ownership, and asymmetric anchor safety. The next candidate is Slice A runtime migration, but no runtime slice is selected.",
              "They preserve current evidence and approve migration separation, helper compatibility, unfinished-plan ownership, and asymmetric anchor safety. Slice A runtime is complete; Slice B is the next selectable but unselected candidate."
          )
          replace(
              "docs/archive/active-plans/REPORT_PROJECTION_ALIGNMENT_PLAN-2026-07-15.md",
              "3. **Outlook / actual snapshot — characterization and compatibility decision completed; Slice A runtime next candidate, unselected** — migrate only the cumulative O-bounded actual balance and fail-closed propagation before independently selecting plan monetary/anchor Slice B.",
              "3. **Outlook / actual snapshot — Slice A completed; Slice B next candidate, unselected** — cumulative O-bounded actual balance and fail-closed propagation are checked-owner runtime; plan monetary/anchor migration remains independent."
          )

          p = Path("docs/OUTLOOK_TEMPORAL_CURRENT.md")
          s = p.read_text()
          marker = "## Numeric ownership and fail-closed status"
          if marker not in s:
              insert = """
## Numeric ownership and fail-closed status

`actual_snapshot.BuildAt(ctx,O)` derives ledger-cumulative inclusive-O actual balances from checked ledger-wide Posting IR through a local `[O,O+1)` actual-layer TBDS closing view. Rows before O are opening, rows on O are movement, and O remains the only actual-balance cutoff.

The snapshot and Outlook expose `ok / error` evidence. Invalid O, invalid-date actual evidence, or rejected actual evidence with a valid coordinate at or before O fails closed. Outlook does not combine plan values with an invalid actual balance or render normal daily-allowance numbers. A valid empty journal remains `ok` with real zero balances.

Current executable evidence: `tests/test_src_next_actual_snapshot_numeric_owner.bqn` and `checks/check-src-next-actual-snapshot.sh`.

"""
              s = s.replace("## Read order\n", insert + "## Read order\n", 1)
              p.write_text(s)

          p = Path("docs/REPORT_CONTRACTS.md")
          s = p.read_text()
          marker = "## Outlook checked actual snapshot boundary"
          if marker not in s:
              insert = """
## Outlook checked actual snapshot boundary

`outlook.BuildAt ⟨ctx,O⟩` receives actual balances from `actual_snapshot.BuildAt ⟨ctx,O⟩`. The snapshot is ledger-cumulative through inclusive O and derives numeric balances from checked Posting IR through a local TBDS view, not an independent journal amount parser.

Snapshot and Outlook status vocabulary for this boundary is `ok / error`. Invalid observation, invalid-date actual evidence, or applicable rejected actual evidence fails closed and suppresses trustworthy monetary output. Valid rejected rows after O do not fail that O snapshot; a valid empty journal is `ok` with zero balances. Outlook machine output includes `src_next_outlook_status`, `src_next_outlook_reason`, and source diagnostics.

Executable coverage: `tests/test_src_next_actual_snapshot_numeric_owner.bqn` and `checks/check-src-next-actual-snapshot.sh`.

"""
              s = s.replace("## Envelope safety note\n", insert + "## Envelope safety note\n", 1)
              p.write_text(s)

          Path(".github/workflows/finalize-actual-snapshot-routing.yml").unlink()
          PY
      - name: Commit routing updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TODO.md docs/OUTLOOK_TEMPORAL_CURRENT.md docs/REPORT_CONTRACTS.md docs/archive/active-plans/REPORT_PROJECTION_ALIGNMENT_PLAN-2026-07-15.md .github/workflows/finalize-actual-snapshot-routing.yml
          git commit -m "docs: complete actual snapshot runtime routing"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
