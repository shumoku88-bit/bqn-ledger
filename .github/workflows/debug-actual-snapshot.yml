name: debug-actual-snapshot

on:
  pull_request:
    branches: [main]

jobs:
  focused:
    runs-on: ubuntu-latest
    env:
      CBQN_REF: master
    steps:
      - uses: actions/checkout@v4
      - name: Install CBQN
        run: |
          git clone --depth 1 --branch "$CBQN_REF" https://github.com/dzaima/CBQN.git >/dev/null 2>&1
          make -C CBQN -j$(nproc) >/dev/null 2>&1
          sudo cp CBQN/BQN /usr/local/bin/bqn
      - name: Run BQN unit suite with focused failure evidence
        shell: bash
        run: |
          set +e
          status=0
          : > /tmp/tests.log
          for test_file in tests/test_*.bqn; do
            echo "RUN: $test_file" >> /tmp/tests.log
            bqn "$test_file" >> /tmp/tests.log 2>&1
            result=$?
            if [ "$result" -ne 0 ]; then
              status=$result
              break
            fi
          done
          tail -n 80 /tmp/tests.log
          exit "$status"
