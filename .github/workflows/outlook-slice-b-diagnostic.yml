name: outlook-slice-b-diagnostic

on:
  pull_request:
    branches: [main]

jobs:
  focused:
    runs-on: ubuntu-latest
    env:
      CBQN_REF: master
    steps:
      - uses: actions/checkout@v4
      - name: Install CBQN quietly
        run: |
          git clone --depth 1 --branch "$CBQN_REF" https://github.com/dzaima/CBQN.git >/dev/null 2>&1
          make -C CBQN -j$(nproc) >/dev/null 2>&1
          sudo cp CBQN/BQN /usr/local/bin/bqn
      - name: Run focused Slice B test
        run: bqn tests/test_src_next_outlook_remaining_plan_numeric_owner.bqn
