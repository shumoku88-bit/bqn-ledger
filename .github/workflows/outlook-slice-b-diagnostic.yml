name: outlook-slice-b-diagnostic

on:
  pull_request:
    branches: [main]

jobs:
  focused:
    runs-on: ubuntu-latest
    env:
      CBQN_REF: master
    steps:
      - name: Clone and run focused Slice B test quietly
        run: |
          git clone --quiet --depth 1 --branch "$GITHUB_HEAD_REF" "https://github.com/$GITHUB_REPOSITORY.git" repo
          git clone --quiet --depth 1 --branch "$CBQN_REF" https://github.com/dzaima/CBQN.git CBQN
          make -C CBQN -j$(nproc) >/dev/null 2>&1
          cd repo
          ../CBQN/BQN tests/test_src_next_outlook_remaining_plan_numeric_owner.bqn
