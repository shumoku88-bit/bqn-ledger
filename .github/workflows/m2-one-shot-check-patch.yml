name: M2 one-shot check patch

on:
  push:
    branches: [feat/currency-m2-editor-input]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/currency-m2-editor-input
          fetch-depth: 0
      - name: Patch checks and self-remove
        run: |
          python3 .github/scripts/patch_m2_checks.py
          rm .github/scripts/patch_m2_checks.py
          rm .github/workflows/m2-one-shot-check-patch.yml
      - name: Commit patched checks
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tools/check.sh checks/check-edit-bqn-account-list.sh checks/check-edit-bqn-journal-add.sh .github/scripts/patch_m2_checks.py .github/workflows/m2-one-shot-check-patch.yml
          git commit -m 'test: route M2 currency editor checks'
          git push origin HEAD:feat/currency-m2-editor-input
