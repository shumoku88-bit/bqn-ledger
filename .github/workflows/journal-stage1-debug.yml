name: journal-stage1-debug

on:
  pull_request:
    branches: [main]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CBQN
        run: |
          git clone --depth 1 https://github.com/dzaima/CBQN.git >/dev/null 2>&1
          make -C CBQN -j$(nproc) >/dev/null 2>&1
          sudo cp CBQN/BQN /usr/local/bin/bqn

      - name: Capture Stage 1 test
        run: |
          set +e
          bqn tests/test_src_next_journal_profile_stage1.bqn > stage1-debug.log 2>&1
          echo $? > stage1-exit-code.txt
          exit 0

      - name: Upload Stage 1 debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: journal-stage1-debug
          path: |
            stage1-debug.log
            stage1-exit-code.txt

      - name: Enforce Stage 1 test result
        run: test "$(cat stage1-exit-code.txt)" = "0"
