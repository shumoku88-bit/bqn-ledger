name: M2 one-shot MCP compatibility patch

on:
  push:
    branches: [feat/currency-m2-editor-input]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/currency-m2-editor-input
          fetch-depth: 0
      - name: Patch MCP compatibility and self-remove
        run: |
          python3 .github/scripts/patch_m2_mcp_compat.py
          rm .github/scripts/patch_m2_mcp_compat.py
          rm .github/workflows/m2-one-shot-mcp-compat.yml
      - name: Commit compatibility patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add mcp-server/core.js mcp-server/test/core.test.js .github/scripts/patch_m2_mcp_compat.py .github/workflows/m2-one-shot-mcp-compat.yml
          git commit -m 'fix: keep MCP editor path explicitly JPY'
          git push origin HEAD:feat/currency-m2-editor-input
