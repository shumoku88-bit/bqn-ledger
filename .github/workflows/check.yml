name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
      CBQN_REF: master
    steps:
      - uses: actions/checkout@v4

      - name: Install CBQN
        run: |
          git clone --depth 1 --branch "$CBQN_REF" https://github.com/dzaima/CBQN.git
          echo "CBQN commit: $(git -C CBQN rev-parse HEAD)"
          make -C CBQN -j$(nproc)
          sudo cp CBQN/BQN /usr/local/bin/bqn

      - name: Install tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - name: Run check.sh
        id: check
        continue-on-error: true
        run: |
          set +e
          bash tools/check.sh > check.log 2>&1
          status=$?
          cat check.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload temporary check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: temporary-check-log
          path: check.log

      - name: Fail when check.sh failed
        if: steps.check.outputs.status != '0'
        run: exit 1

      - name: Coverage
        run: bash tools/coverage
