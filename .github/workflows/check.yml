name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
      CBQN_REF: master
    steps:
      - uses: actions/checkout@v4

      - name: Install CBQN
        run: |
          git clone --depth 1 --branch "$CBQN_REF" https://github.com/dzaima/CBQN.git
          echo "CBQN commit: $(git -C CBQN rev-parse HEAD)"
          make -C CBQN -j$(nproc)
          sudo cp CBQN/BQN /usr/local/bin/bqn

      - name: Install tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - name: Run check.sh
        id: check
        continue-on-error: true
        run: bash tools/check.sh > check.log 2>&1

      - name: Upload check log
        if: steps.check.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: check-log
          path: check.log

      - name: Report check failure
        if: steps.check.outcome == 'failure'
        run: |
          tail -n 100 check.log
          exit 1

      - name: Coverage
        if: steps.check.outcome == 'success'
        run: bash tools/coverage
