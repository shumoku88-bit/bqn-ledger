name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: |
            editor/go.sum

      - name: Install CBQN
        run: |
          git clone --depth 1 https://github.com/dzaima/CBQN.git
          echo "CBQN commit: $(git -C CBQN rev-parse HEAD)"
          make -C CBQN -j$(nproc)
          sudo cp CBQN/BQN /usr/local/bin/bqn

      - name: Install tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - name: Run check.sh
        run: bash tools/check.sh

      - name: Coverage
        run: bash tools/coverage
