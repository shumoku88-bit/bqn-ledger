name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
      CBQN_COMMIT: 12a4fb9f
    steps:
      - uses: actions/checkout@v4

      - name: Install CBQN
        run: |
          git init CBQN
          git -C CBQN remote add origin https://github.com/dzaima/CBQN.git
          git -C CBQN fetch --depth 1 origin "$CBQN_COMMIT"
          git -C CBQN checkout --detach FETCH_HEAD
          echo "CBQN commit: $(git -C CBQN rev-parse HEAD)"
          make -C CBQN -j$(nproc)
          sudo cp CBQN/BQN /usr/local/bin/bqn

      - name: Install tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - name: Run check.sh
        run: bash tools/check.sh

      - name: Coverage
        run: bash tools/coverage
