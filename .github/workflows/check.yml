name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
      CBQN_REF: master
    steps:
      - uses: actions/checkout@v4

      - name: Install CBQN
        run: |
          git clone --depth 1 --branch "$CBQN_REF" https://github.com/dzaima/CBQN.git
          echo "CBQN commit: $(git -C CBQN rev-parse HEAD)"
          make -C CBQN -j$(nproc)
          sudo cp CBQN/BQN /usr/local/bin/bqn

      - name: Install tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - name: Run check.sh
        run: bash tools/check.sh 2>&1 | tee check-failure.log

      - name: Upload check failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: check-failure-log
          path: check-failure.log

      - name: Coverage
        run: bash tools/coverage
