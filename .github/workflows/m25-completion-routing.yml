name: m25-completion-routing

on:
  push:
    branches:
      - docs/verify-currency-m25-production
    paths:
      - '.github/scripts/patch_m25_completion.py'
      - '.github/workflows/m25-completion-routing.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/verify-currency-m25-production
      - name: Patch TODO routing
        run: python3 .github/scripts/patch_m25_completion.py
      - name: Remove one-shot helpers
        run: |
          rm .github/scripts/patch_m25_completion.py
          rm .github/workflows/m25-completion-routing.yml
      - name: Commit changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add TODO.md .github/scripts/patch_m25_completion.py .github/workflows/m25-completion-routing.yml
          git commit -m 'docs: close M2.5 and leave next slices unselected'
          git push
